name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install workspaces
        run: npm ci --no-audit --no-fund

      # The packages have an internal build dependency chain
      # (sdk → gateway-core → cli + pack-* → gateway). Running --workspaces
      # build in the right order is handled by npm because each package's
      # tsc resolves siblings via the workspace symlinks created at install.
      - name: Build all workspaces
        run: npm run --workspaces --if-present build

      - name: Run tests across all workspaces
        run: npm run --workspaces --if-present test
