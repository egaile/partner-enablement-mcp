name: CI

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install workspaces
        run: npm ci --no-audit --no-fund

      # `npm run build` at the root sequences sdk → gateway-core →
      # packs → cli + gateway. npm doesn't topologically order
      # `--workspaces run build`, so a naive iteration tries to build
      # consumers before their dependencies' .d.ts files exist.
      - name: Build packages (dependency-ordered)
        run: npm run build

      - name: Run tests across all workspaces
        run: npm test
