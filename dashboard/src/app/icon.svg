<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0f172a"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#shieldGrad)" stroke-width="4" opacity="0.3"/>
  <!-- Shield shape -->
  <path d="M256 72 L400 140 L400 280 C400 360 340 420 256 448 C172 420 112 360 112 280 L112 140 Z"
        fill="url(#shieldGrad)" opacity="0.15"/>
  <path d="M256 72 L400 140 L400 280 C400 360 340 420 256 448 C172 420 112 360 112 280 L112 140 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="8" stroke-linejoin="round"/>
  <!-- Central hub node -->
  <circle cx="256" cy="240" r="36" fill="url(#shieldGrad)"/>
  <circle cx="256" cy="240" r="28" fill="#0f172a"/>
  <circle cx="256" cy="240" r="14" fill="url(#glowGrad)"/>
  <!-- Circuit lines radiating out -->
  <!-- Top -->
  <line x1="256" y1="204" x2="256" y2="148" stroke="url(#glowGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="140" r="10" fill="url(#shieldGrad)"/>
  <!-- Bottom -->
  <line x1="256" y1="276" x2="256" y2="348" stroke="url(#glowGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="356" r="10" fill="url(#shieldGrad)"/>
  <!-- Top-left -->
  <line x1="228" y1="216" x2="176" y2="176" stroke="url(#glowGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="170" cy="172" r="10" fill="url(#shieldGrad)"/>
  <!-- Top-right -->
  <line x1="284" y1="216" x2="336" y2="176" stroke="url(#glowGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="342" cy="172" r="10" fill="url(#shieldGrad)"/>
  <!-- Bottom-left -->
  <line x1="228" y1="264" x2="176" y2="312" stroke="url(#glowGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="170" cy="318" r="10" fill="url(#shieldGrad)"/>
  <!-- Bottom-right -->
  <line x1="284" y1="264" x2="336" y2="312" stroke="url(#glowGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="342" cy="318" r="10" fill="url(#shieldGrad)"/>
  <!-- Checkmark in center -->
  <polyline points="244,240 254,252 272,228" fill="none" stroke="#e0e7ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
